name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest

    # Guard 1: only run for Dependabot PRs
    if: |
      github.actor == 'dependabot[bot]' &&
      startsWith(github.head_ref, 'dependabot/')

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag major updates for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "$(cat <<'EOF'
          ## ⚠️ Major Version Bump — Manual Review Required

          This Dependabot PR contains a **major** version update:
          - **Package:** ${{ steps.metadata.outputs.dependency-names }}
          - **From:** ${{ steps.metadata.outputs.previous-version }}
          - **To:** ${{ steps.metadata.outputs.new-version }}

          Major bumps may contain breaking changes. Auto-merge has **not** been enabled.
          Please review the changelog, verify compatibility, and merge manually when ready.
          EOF
          )"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
